AWSTemplateFormatVersion: '2010-09-09'
Transform: AWS::Serverless-2016-10-31
Description: AI-powered incident alert summarizer

Parameters:
  GithubWebhookSecretArn:
    Type: String
    Description: Secrets Manager ARN for the GitHub webhook signing secret
  DatadogWebhookSecretArn:
    Type: String
    Description: Secrets Manager ARN for the Datadog X-Webhook-Secret shared header value
  AnthropicApiKeySecretArn:
    Type: String
    Description: Secrets Manager ARN for the Anthropic API key
  SlackBotTokenSecretArn:
    Type: String
    Description: Secrets Manager ARN for the Slack bot token
  SlackChannelId:
    Type: String
    Description: Slack channel ID to post incident alerts to
  JiraApiTokenSecretArn:
    Type: String
    Description: Secrets Manager ARN for the Jira API token
  JiraBaseUrl:
    Type: String
    Description: Base URL for the Jira instance (e.g. https://your-org.atlassian.net)
  JiraProjectKey:
    Type: String
    Description: Jira project key for new incident tickets (e.g. INC)
  JiraUserEmail:
    Type: String
    Description: Email address associated with the Jira API token
  DatadogApiKeySecretArn:
    Type: String
    Description: Secrets Manager ARN for the Datadog API key
  DatadogEnv:
    Type: String
    Description: Deployment environment for Datadog tagging (dev / staging / prod)
    Default: dev

Globals:
  Function:
    Runtime: python3.11
    Timeout: 29
    MemorySize: 128
    Handler: datadog_lambda.handler.handler
    Environment:
      Variables:
        POWERTOOLS_SERVICE_NAME: incident-summarizer
        DD_LAMBDA_HANDLER: app.handler
        DD_API_KEY_SECRET_ARN: !Ref DatadogApiKeySecretArn
        DD_SITE: datadoghq.com
        DD_ENV: !Ref DatadogEnv
        DD_TRACE_ENABLED: "true"
        DD_SERVERLESS_LOGS_ENABLED: "true"
        DD_CAPTURE_LAMBDA_PAYLOAD: "false"
        DD_FLUSH_TO_LOG: "false"

Resources:

  # ── Shared layer ────────────────────────────────────────────────────────────

  CommonLayer:
    Type: AWS::Serverless::LayerVersion
    Properties:
      ContentUri: layers/common/
      CompatibleRuntimes:
        - python3.11
    Metadata:
      BuildMethod: python3.11

  # ── Webhook path (Datadog + GitHub Actions) ─────────────────────────────────

  WebhookApi:
    Type: AWS::Serverless::HttpApi
    Properties:
      StageName: prod
      Description: Receives inbound webhooks from Datadog and GitHub Actions

  WebhookReceiverFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/webhook_receiver/
      Description: Validates HMAC signatures and forwards payloads to the normalizer
      Layers:
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Python311:125
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Extension:97
      Environment:
        Variables:
          GITHUB_WEBHOOK_SECRET_ARN: !Ref GithubWebhookSecretArn
          DATADOG_WEBHOOK_SECRET_ARN: !Ref DatadogWebhookSecretArn
          NORMALIZER_FUNCTION_NAME: !Ref NormalizerFunction
      Policies:
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !Ref GithubWebhookSecretArn
                - !Ref DatadogWebhookSecretArn
                - !Ref DatadogApiKeySecretArn
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt NormalizerFunction.Arn
      Events:
        GithubWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /webhook/github
            Method: POST
        DatadogWebhook:
          Type: HttpApi
          Properties:
            ApiId: !Ref WebhookApi
            Path: /webhook/datadog
            Method: POST

  # ── Normalizer ──────────────────────────────────────────────────────────────

  NormalizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/normalizer/
      Description: Normalises raw alert payloads to the shared incident schema
      Layers:
        - !Ref CommonLayer
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Python311:125
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Extension:97
      Environment:
        Variables:
          DEDUP_FUNCTION_NAME: !Ref DedupFunction
      Policies:
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref DatadogApiKeySecretArn
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt DedupFunction.Arn

  # ── Deduplication + correlation ─────────────────────────────────────────────

  DeduplicationTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: fingerprint
          AttributeType: S
      KeySchema:
        - AttributeName: fingerprint
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  CorrelationWindowTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: service_key
          AttributeType: S
      KeySchema:
        - AttributeName: service_key
          KeyType: HASH
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  DedupFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/dedup/
      Description: Suppresses duplicate alerts and groups related alerts into incidents
      Layers:
        - !Ref CommonLayer
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Python311:125
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Extension:97
      Environment:
        Variables:
          DEDUP_TABLE_NAME: !Ref DeduplicationTable
          CORRELATION_TABLE_NAME: !Ref CorrelationWindowTable
          INCIDENT_TABLE_NAME: !Ref IncidentTable
          SUMMARIZER_FUNCTION_NAME: !Ref SummarizerFunction
          CORRELATION_WINDOW_MINUTES: "5"
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref DeduplicationTable
        - DynamoDBCrudPolicy:
            TableName: !Ref CorrelationWindowTable
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentTable
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource: !Ref DatadogApiKeySecretArn
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt SummarizerFunction.Arn

  # ── Incident store ───────────────────────────────────────────────────────────

  IncidentTable:
    Type: AWS::DynamoDB::Table
    Properties:
      BillingMode: PAY_PER_REQUEST
      AttributeDefinitions:
        - AttributeName: incident_id
          AttributeType: S
        - AttributeName: affected_service
          AttributeType: S
        - AttributeName: status
          AttributeType: S
        - AttributeName: created_at
          AttributeType: S
      KeySchema:
        - AttributeName: incident_id
          KeyType: HASH
      GlobalSecondaryIndexes:
        - IndexName: service-created-index
          KeySchema:
            - AttributeName: affected_service
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
        - IndexName: status-created-index
          KeySchema:
            - AttributeName: status
              KeyType: HASH
            - AttributeName: created_at
              KeyType: RANGE
          Projection:
            ProjectionType: ALL
      TimeToLiveSpecification:
        AttributeName: ttl
        Enabled: true

  # ── LLM summarizer ──────────────────────────────────────────────────────────

  SummarizerFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/summarizer/
      Description: Summarizes grouped incidents using Claude via the Anthropic API
      Layers:
        - !Ref CommonLayer
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Python311:125
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Extension:97
      Environment:
        Variables:
          INCIDENT_TABLE_NAME: !Ref IncidentTable
          ANTHROPIC_API_KEY_SECRET_ARN: !Ref AnthropicApiKeySecretArn
          MODEL_ID: claude-sonnet-4-6
          SLACK_NOTIFIER_FUNCTION_NAME: !Ref SlackNotifierFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentTable
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !Ref AnthropicApiKeySecretArn
                - !Ref DatadogApiKeySecretArn
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt SlackNotifierFunction.Arn

  # ── Slack notifier ───────────────────────────────────────────────────────────

  SlackNotifierFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/slack_notifier/
      Description: Posts incident summaries to Slack and maintains thread continuity
      Layers:
        - !Ref CommonLayer
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Python311:125
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Extension:97
      Environment:
        Variables:
          INCIDENT_TABLE_NAME: !Ref IncidentTable
          SLACK_BOT_TOKEN_SECRET_ARN: !Ref SlackBotTokenSecretArn
          SLACK_CHANNEL_ID: !Ref SlackChannelId
          JIRA_CREATOR_FUNCTION_NAME: !Ref JiraCreatorFunction
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentTable
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !Ref SlackBotTokenSecretArn
                - !Ref DatadogApiKeySecretArn
        - Statement:
            - Effect: Allow
              Action: lambda:InvokeFunction
              Resource: !GetAtt JiraCreatorFunction.Arn

  # ── Jira ticket creator ──────────────────────────────────────────────────────

  JiraCreatorFunction:
    Type: AWS::Serverless::Function
    Properties:
      CodeUri: functions/jira_creator/
      Description: Creates Jira tickets for new incidents and writes the ticket ID back to DynamoDB
      Layers:
        - !Ref CommonLayer
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Python311:125
        - !Sub arn:aws:lambda:${AWS::Region}:464622532012:layer:Datadog-Extension:97
      Environment:
        Variables:
          INCIDENT_TABLE_NAME: !Ref IncidentTable
          JIRA_API_TOKEN_SECRET_ARN: !Ref JiraApiTokenSecretArn
          JIRA_BASE_URL: !Ref JiraBaseUrl
          JIRA_PROJECT_KEY: !Ref JiraProjectKey
          JIRA_USER_EMAIL: !Ref JiraUserEmail
          SLACK_CHANNEL_ID: !Ref SlackChannelId
      Policies:
        - DynamoDBCrudPolicy:
            TableName: !Ref IncidentTable
        - Statement:
            - Effect: Allow
              Action: secretsmanager:GetSecretValue
              Resource:
                - !Ref JiraApiTokenSecretArn
                - !Ref DatadogApiKeySecretArn

  # ── CloudWatch → EventBridge path ──────────────────────────────────────────

  NormalizerDLQ:
    Type: AWS::SQS::Queue
    Properties:
      MessageRetentionPeriod: 1209600  # 14 days

  NormalizerDLQPolicy:
    Type: AWS::SQS::QueuePolicy
    Properties:
      Queues:
        - !Ref NormalizerDLQ
      PolicyDocument:
        Version: "2012-10-17"
        Statement:
          - Effect: Allow
            Principal:
              Service: events.amazonaws.com
            Action: sqs:SendMessage
            Resource: !GetAtt NormalizerDLQ.Arn
            Condition:
              ArnEquals:
                aws:SourceArn: !GetAtt CloudWatchAlarmEventRule.Arn

  CloudWatchAlarmEventRule:
    Type: AWS::Events::Rule
    Properties:
      Description: Routes CloudWatch alarm state changes to the normalizer Lambda
      EventPattern:
        source:
          - aws.cloudwatch
        detail-type:
          - CloudWatch Alarm State Change
      State: ENABLED
      Targets:
        - Id: NormalizerTarget
          Arn: !GetAtt NormalizerFunction.Arn
          DeadLetterConfig:
            Arn: !GetAtt NormalizerDLQ.Arn

  NormalizerEventBridgePermission:
    Type: AWS::Lambda::Permission
    Properties:
      FunctionName: !GetAtt NormalizerFunction.Arn
      Action: lambda:InvokeFunction
      Principal: events.amazonaws.com
      SourceArn: !GetAtt CloudWatchAlarmEventRule.Arn

  # ── Test alarm (trigger manually with set-alarm-state to verify the rule) ──

  TestCloudWatchAlarm:
    Type: AWS::CloudWatch::Alarm
    Properties:
      AlarmName: !Sub "${AWS::StackName}-test-alarm"
      AlarmDescription: Test alarm for EventBridge rule verification (RC1-33)
      Namespace: AWS/Lambda
      MetricName: Errors
      Dimensions:
        - Name: FunctionName
          Value: !Ref NormalizerFunction
      Statistic: Sum
      Period: 60
      EvaluationPeriods: 1
      Threshold: 0
      ComparisonOperator: GreaterThanThreshold
      TreatMissingData: notBreaching

Outputs:
  WebhookApiUrl:
    Description: Base URL for the webhook API endpoint
    Value: !Sub "https://${WebhookApi}.execute-api.${AWS::Region}.amazonaws.com"

  NormalizerDLQUrl:
    Description: SQS DLQ URL for failed EventBridge-to-normalizer deliveries
    Value: !Ref NormalizerDLQ

  IncidentTableName:
    Description: DynamoDB incident table name
    Value: !Ref IncidentTable
